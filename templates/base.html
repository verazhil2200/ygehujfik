<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Сюди буде підставлятись назва сторінки -->
  <title>{% block title %}{% endblock %}</title>

  <!-- Стиль однаковий: від bootstrap-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <!-- СПІЛЬНІ ЕЛЕМЕНТИ -->

  <nav class="navbar navbar-dark bg-dark mb-3">
    <div class="container">
      <a class="navbar-brand" href="#">
        <img src="{{ url_for('static', filename='images/logo.png') }}" style="filter: invert(100%)" alt="Logo"
             width="30" height="30" class="d-inline-block align-text-top">
        <span class="navbar-brand h1">PRODUCT MANAGER</span>
      </a>

      <div>
        <a href="{{ url_for('register') }}" class="btn btn-outline-light">Register</a>
        <a href="{{ url_for('login') }}" class="btn btn-light">Login</a>
      </div>

    </div>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-info" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <!-- Тут будуть унікальні елементи кожної окремої сторінки -->
  {% block content %}{% endblock %}

</body>
</html>
